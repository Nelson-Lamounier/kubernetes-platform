# @format
# ArgoCD Application: Argo Rollouts Controller
#
# Installs the Argo Rollouts controller for progressive delivery (Canary/Blue-Green).
# Deploys CRDs (Rollout, AnalysisTemplate, AnalysisRun, Experiment) and the controller
# that manages rollout lifecycle, traffic splitting, and metric analysis.
#
# Uses the official Helm chart from the argo-helm repository instead of raw
# manifests. The Helm chart avoids the `metadata.managedFields must be nil`
# error that occurs when applying raw CRD manifests via Server-Side Apply.
#
# Wave 3: Platform tier — must be installed before Business Apps (wave 5)
# that use Rollout resources instead of Deployments.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-rollouts
  annotations:
    kubernetes.io/description: "Argo Rollouts controller for progressive delivery (Canary/Blue-Green)"
    argocd.argoproj.io/sync-wave: "3"  # Wave 3: Platform — CRDs must exist before wave 5 Rollouts
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: argocd
    app.kubernetes.io/component: argo-rollouts
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-rollouts
    targetRevision: 2.40.6
    helm:
      releaseName: argo-rollouts
      valuesObject:
        # Install CRDs — required for Rollout, AnalysisTemplate, etc.
        installCRDs: true
        controller:
          replicas: 1
          # Schedule on the ArgoCD worker node (Spot)
          nodeSelector:
            workload: argocd
          tolerations:
            - key: workload
              operator: Equal
              value: argocd
              effect: NoSchedule
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 25m
              memory: 64Mi
        dashboard:
          enabled: true  # Web UI for managing rollouts (promote/abort)
          nodeSelector:
            workload: argocd
          tolerations:
            - key: workload
              operator: Equal
              value: argocd
              effect: NoSchedule
          resources:
            limits:
              cpu: 50m
              memory: 64Mi
            requests:
              cpu: 10m
              memory: 32Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: argo-rollouts

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
