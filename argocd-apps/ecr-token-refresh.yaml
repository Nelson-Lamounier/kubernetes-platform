# @format
# ArgoCD Application: ECR Token Refresh
#
# Manages the CronJob that refreshes ECR docker-registry credentials
# in the argocd namespace every 6 hours. The ecr-credentials secret
# is consumed by ArgoCD Image Updater for ECR authentication.
#
# Resources managed:
#   - ServiceAccount, Role, RoleBinding (RBAC for secret management)
#   - CronJob (runs aws ecr get-login-password → K8s secret)

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ecr-token-refresh
  namespace: argocd
  annotations:
    kubernetes.io/description: "CronJob that refreshes ECR credentials for Image Updater"
    argocd.argoproj.io/sync-wave: "4"  # Wave 4: Cluster Utilities
  labels:
    app.kubernetes.io/part-of: argocd
    app.kubernetes.io/component: ecr-token-refresh
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: git@github.com:Nelson-Lamounier/cdk-monitoring.git
    targetRevision: develop
    path: kubernetes-app/platform/charts/ecr-token-refresh

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
