# @format
# ArgoCD Application: Image Updater
#
# Installs ArgoCD Image Updater from the official Helm chart.
# Image Updater watches ECR for new container images and automatically
# updates the image tag on annotated ArgoCD Applications.
#
# Authentication: Uses a docker-registry K8s secret (ecr-credentials)
# refreshed by a CronJob every 6 hours.
#
# Prerequisite: ecr-token-refresh Application must be deployed (provides
# the ecr-credentials secret in the argocd namespace).

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-image-updater
  namespace: argocd
  annotations:
    kubernetes.io/description: "ArgoCD Image Updater — auto-updates container image tags from ECR"
    argocd.argoproj.io/sync-wave: "4"  # Wave 4: Cluster Utilities
  labels:
    app.kubernetes.io/part-of: argocd
    app.kubernetes.io/component: image-updater
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    chart: argocd-image-updater
    repoURL: https://argoproj.github.io/argo-helm
    targetRevision: 0.11.0
    helm:
      values: |
        # --- ArgoCD connection ---
        config:
          argocd:
            grpcWeb: true
            insecure: true
            plaintext: true
            serverAddress: argocd-server.argocd.svc.cluster.local

          # --- ECR Registry ---
          registries:
            - name: ECR
              api_url: https://771826808455.dkr.ecr.eu-west-1.amazonaws.com
              prefix: 771826808455.dkr.ecr.eu-west-1.amazonaws.com
              default: true
              credentials: pullsecret:argocd/ecr-credentials
              # ECR tokens last 12h, CronJob refreshes every 6h.
              # Cache must expire BEFORE the next CronJob run so the
              # Image Updater always picks up a fresh token.
              credsexpire: 4h

        # --- Image Updater log level ---
        log:
          level: info

        # --- Resources ---
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi

        # --- Node placement (general pool, Spot — no taint) ---
        nodeSelector:
          node-pool: general

        # --- Metrics ---
        metrics:
          enabled: true
          serviceMonitor:
            enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
