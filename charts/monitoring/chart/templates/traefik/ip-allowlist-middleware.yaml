# Traefik IPAllowList Middleware — Admin Access Restriction
#
# Restricts access to monitoring and admin services to configured IPs only.
# IPs are passed via Helm values (populated by the CI/CD pipeline from
# GitHub Environment secrets ALLOW_IPV4/ALLOW_IPV6).
#
# Any request not matching the allow list receives a 403 Forbidden response.

{{- if .Values.adminAccess.enabled }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: admin-ip-allowlist
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "monitoring.labels" . | nindent 4 }}
spec:
  ipAllowList:
    sourceRange:
      {{- if .Values.adminAccess.allowedIps }}
      {{- range .Values.adminAccess.allowedIps }}
      - {{ . | quote }}
      {{- end }}
      {{- else }}
      []
      {{- end }}
{{- end }}
