{{- if .Values.adminAccess.enabled }}
# Fallback secret for the basic-auth Middleware.
# deploy.py will overwrite this with the real htpasswd hash from SSM
# once the bootstrap pipeline runs. Without this placeholder, Traefik
# fails to load the Middleware (and therefore the entire Prometheus
# IngressRoute) because the referenced secret does not exist.
apiVersion: v1
kind: Secret
metadata:
  name: prometheus-basic-auth-secret
  namespace: {{ .Values.namespace }}
  labels: {{- include "monitoring.fullLabels" "prometheus" | nindent 4 }}
  annotations:
    helm.sh/hook-weight: "-1"
type: Opaque
stringData:
  # Default: admin / changeme  (htpasswd bcrypt hash)
  # deploy.py replaces this with the real SSM value on bootstrap.
  users: "admin:$2y$05$placeholder00000000000000000000000000000000000000"
{{- end }}
