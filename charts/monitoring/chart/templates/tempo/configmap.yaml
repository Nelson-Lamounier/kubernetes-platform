apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "monitoring.fullLabels" "tempo" | nindent 4 }}
data:
  tempo.yaml: |
    server:
      http_listen_port: {{ .Values.tempo.service.httpPort }}
    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: "0.0.0.0:{{ .Values.tempo.service.otlpGrpcPort }}"
            http:
              endpoint: "0.0.0.0:{{ .Values.tempo.service.otlpHttpPort }}"
    ingester:
      trace_idle_period: 30s
      max_block_bytes: 1073741824
      max_block_duration: 5m
    compactor:
      compaction:
        block_retention: 72h
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal
    metrics_generator:
      processor:
        local_blocks:
          max_live_traces: 2000
          flush_check_period: 5s
          complete_block_timeout: 15s
        service_graphs:
          dimensions:
            - http.method
            - http.status_code
        span_metrics:
          dimensions:
            - service.name
            - http.method
            - http.status_code
          enable_target_info: true
      registry:
        external_labels:
          source: tempo
      storage:
        path: /var/tempo/generator/wal
        remote_write:
          - url: http://prometheus.{{ .Values.namespace }}.svc.cluster.local:9090/prometheus/api/v1/write
            send_exemplars: true
    overrides:
      defaults:
        metrics_generator:
          processors:
            - service-graphs
            - span-metrics
        global:
          max_bytes_per_trace: 5000000  # 5MB cap — prevents single large traces from spiking memory
