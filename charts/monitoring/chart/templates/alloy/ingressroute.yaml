{{- if .Values.alloy.ingress.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: alloy-faro-ingress
  namespace: {{ .Values.namespace }}
  labels: {{- include "monitoring.fullLabels" "alloy" | nindent 4 }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: {{ .Values.alloy.ingress.matchRule }}
      kind: Rule
      priority: 110
      services:
        - name: alloy
          port: {{ .Values.alloy.service.faroPort }}
      middlewares:
        - name: faro-stripprefix
        - name: faro-cors
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: faro-stripprefix
  namespace: {{ .Values.namespace }}
  labels: {{- include "monitoring.fullLabels" "alloy" | nindent 4 }}
spec:
  stripPrefix:
    prefixes:
      - /faro
---
# CORS middleware — required because Traefik handles browser preflight
# OPTIONS requests before they reach Alloy's own cors_allowed_origins.
# Without this, cross-origin Faro SDK requests from the main domain to
# ops.{domain} are blocked by the browser.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: faro-cors
  namespace: {{ .Values.namespace }}
  labels: {{- include "monitoring.fullLabels" "alloy" | nindent 4 }}
spec:
  headers:
    accessControlAllowOriginList:
      {{- range .Values.alloy.ingress.corsAllowedOrigins }}
      - {{ . | quote }}
      {{- end }}
    accessControlAllowMethods:
      - "GET"
      - "POST"
      - "OPTIONS"
    accessControlAllowHeaders:
      - "Content-Type"
      - "X-Faro-Session-Id"
    accessControlMaxAge: 3600
{{- end }}
