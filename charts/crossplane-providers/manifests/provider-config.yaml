# @format
# ProviderConfig — AWS Credential Binding
#
# Tells all Crossplane AWS providers where to find credentials.
# References the K8s Secret created by the bootstrap script
# from the Secrets Manager secret provisioned by CrossplaneStack.
#
# This is in a SEPARATE file from providers.yaml because the
# ProviderConfig CRD (aws.upbound.io/ProviderConfig) is installed
# asynchronously by the Provider controllers. ArgoCD's SkipDryRun
# annotation prevents the dry-run from failing when the CRD
# doesn't exist yet — the actual apply will succeed once the
# Provider pods have started and registered their CRDs.
#
# Secret format (created by bootstrap):
#   [default]
#   aws_access_key_id = AKIA...
#   aws_secret_access_key = ...
apiVersion: aws.upbound.io/v1beta1
kind: ProviderConfig
metadata:
  name: default
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRun=true
  labels:
    platform.engineering/component: infrastructure-abstraction
spec:
  credentials:
    source: Secret
    secretRef:
      namespace: crossplane-system
      name: crossplane-aws-creds
      key: credentials
