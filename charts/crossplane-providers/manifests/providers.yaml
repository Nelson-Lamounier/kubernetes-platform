# @format
# Crossplane AWS Provider: S3
#
# Installs the Crossplane provider for managing S3 buckets.
# The provider runs as a Kubernetes controller that watches
# for S3-related CRDs and reconciles them against AWS.
#
# Resource overhead: ~128Mi memory per provider
# Version pinned for stability — update deliberately.
---
apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-aws-s3
  labels:
    platform.engineering/component: infrastructure-abstraction
spec:
  package: xpkg.upbound.io/upbound/provider-aws-s3:v1.18.0
  runtimeConfigRef:
    name: crossplane-provider-config

---
# Crossplane AWS Provider: SQS
#
# Installs the Crossplane provider for managing SQS queues.
apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-aws-sqs
  labels:
    platform.engineering/component: infrastructure-abstraction
spec:
  package: xpkg.upbound.io/upbound/provider-aws-sqs:v1.18.0
  runtimeConfigRef:
    name: crossplane-provider-config

---
# DeploymentRuntimeConfig — Resource limits + scheduling for provider pods
#
# Replaces the deprecated ControllerConfig (v1alpha1) with the stable
# DeploymentRuntimeConfig (v1beta1). Required for Crossplane >= 1.14.
# Constrains memory/CPU to fit a t3.medium monitoring pool node.
# Both providers share this config to enforce consistent limits.
apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
  name: crossplane-provider-config
  labels:
    platform.engineering/component: infrastructure-abstraction
spec:
  deploymentTemplate:
    spec:
      template:
        spec:
          nodeSelector:
            node-pool: monitoring
          tolerations:
            - key: dedicated
              operator: Equal
              value: monitoring
              effect: NoSchedule
          containers:
            - name: package-runtime
              resources:
                limits:
                  cpu: 100m
                  memory: 128Mi
                requests:
                  cpu: 25m
                  memory: 64Mi
